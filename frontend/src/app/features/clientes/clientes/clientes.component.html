<div class="form-container">

  <form [formGroup]="clienteForm">

    <div class="row">
      <div class="field">
        <label>Nombre / Razón Social</label>
        <input type="text" formControlName="nombre_razon">
      </div>

      <div class="field">
        <label>DNI / RUC</label>
        <input type="text" formControlName="ruc_dni">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Teléfono</label>
        <input type="text" formControlName="telefono">
      </div>

      <div class="field">
        <label>Correo</label>
        <input type="email" formControlName="correo">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Dirección</label>
        <input type="text" formControlName="direccion">
      </div>

      <div class="field">
        <label>Departamento</label>
        <input type="text" formControlName="departamento">
      </div>
    </div>
    <button class="btn-guardar" type="button" (click)="guardarCliente()">
    Guardar
    </button>

  </form>
  
</div>

<!-- tabla  de clientes -->
<div class="tabla-clientes-container" #tablaRef>
  <table class="tabla-clientes">
    <thead>
      <tr>
        <th>Item</th>
        <th>Nombre / Razon Social</th>
        <th>Ruc / Dni</th>
        <th>Telefono</th>
        <th>Correo</th>
        <th>Direccion</th>
        <th>Departamento</th>
      </tr>
    </thead>

    <tbody>

      <tr 
        *ngFor="let c of clientes; let i = index"
        (click)="seleccionarCliente(c, i)"
        [class.seleccionado]="clienteSeleccionado?.index === i"
      >
        <td>{{ i + 1 }}</td>
        <td>{{ c.nombre_razon }}</td>
        <td>{{ c.ruc_dni }}</td>
        <td>{{ c.telefono }}</td>
        <td>{{ c.correo }}</td>
        <td>{{ c.direccion }}</td>
        <td>{{ c.departamento }}</td>
      </tr>

      <tr *ngIf="clientes.length === 0">
        <td colspan="7" class="no-data">
          No hay clientes registrados aún.
        </td>
      </tr>

    </tbody>
  </table>
</div>

<!--botones  editar y eliminar -->
<div class="acciones-contenedor">
  <button class="btn-editar" (click)="onEditar()">
    Editar
  </button>

  <button class="btn-eliminar" (click)="onEliminar()">
    Eliminar
  </button>
</div>
